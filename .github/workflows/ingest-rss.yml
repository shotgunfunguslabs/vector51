name: ingest-rss

on:
  schedule:
    - cron: "0 5,17 * * *"   # 05:00 and 17:00 UTC daily
  workflow_dispatch: {}        # manual run button for testing

permissions:
  contents: write              # needed only for the heartbeat commit

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run RSS ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ingest_rss.mjs

      # GitHub disables cron schedules after 60 days without repo activity.
      # If the last commit is older than 25 days, push a heartbeat to keep alive.
      - name: Heartbeat (prevents schedule auto-disable)
        run: |
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          age=$(( (now - last) / 86400 ))
          echo "days since last commit: $age"
          if [ "$age" -ge 25 ]; then
            git config user.name "vector51-bot"
            git config user.email "bot@users.noreply.github.com"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/heartbeat
            git add .github/heartbeat
            git commit -m "chore: ingestion heartbeat"
            git push
          fi
